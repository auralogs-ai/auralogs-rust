name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --check

      - run: cargo clippy --all-targets --all-features -- -D warnings

      # Tests that install global panic hooks (panic_hook_emits_fatal_entry,
      # global_metadata_supplier_panic_does_not_crash_logging) collide when
      # run in parallel because std::panic::set_hook is global state. Force
      # single-threaded execution to keep them deterministic.
      - run: cargo test --all-features -- --test-threads=1

      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
